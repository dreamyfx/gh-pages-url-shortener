name: Inject Token into 404.html

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Replace placeholder with secret token
        run: sed -i "s/TOKEN_PLACEHOLDER/${{ secrets.TOKEN }}/g" 404.html
      
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 404.html
          git diff --quiet && git diff --staged --quiet || git commit -m "🔒 Inject token [skip ci]"
          git push
